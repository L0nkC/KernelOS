name: Build KernelOS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc-multilib \
          g++-multilib \
          xorriso \
          grub-pc-bin \
          grub-common \
          make
          
    - name: Build kernel
      run: |
        make clean
        make kernelos.bin
        
    - name: Verify kernel binary
      run: |
        file kernelos.bin
        ls -la kernelos.bin
        
    - name: Create ISO
      run: |
        make iso
        
    - name: Verify ISO
      run: |
        ls -lh kernelos.iso
        file kernelos.iso
        
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernelos-iso
        path: kernelos.iso
        retention-days: 30
        
    - name: Upload kernel binary
      uses: actions/upload-artifact@v4
      with:
        name: kernelos-bin
        path: kernelos.bin
        retention-days: 30
