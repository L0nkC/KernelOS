name: Release KernelOS

on:
  push:
    tags:
      - 'v*'  # Push tags like v1.0, v2.0, etc.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc-i686-linux-gnu \
          binutils-i686-linux-gnu \
          xorriso \
          grub-pc-bin \
          grub-common \
          make
          
    - name: Build kernel and ISO
      run: |
        make clean
        make iso
        
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: KernelOS ${{ steps.get_version.outputs.VERSION }}
        files: |
          kernelos.iso
          kernelos.bin
        body: |
          KernelOS Release ${{ steps.get_version.outputs.VERSION }}
          
          ## Files
          - `kernelos.iso` - Bootable CD image
          - `kernelos.bin` - Raw kernel binary
          
          ## Testing
          ```bash
          # Run in QEMU
          qemu-system-i386 -cdrom kernelos.iso -m 64M -vga std -boot d
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
